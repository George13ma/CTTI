<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0b0e11">
  <title>CTTI — Crypto Trader Type Indicator</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-N0ZJM0GQFP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-N0ZJM0GQFP');
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0e11;
      --surface:  rgba(255,255,255,0.04);
      --surface2: rgba(255,255,255,0.07);
      --border:   rgba(255,255,255,0.1);
      --border-h: rgba(255,255,255,0.22);
      --green:    #00c853;
      --green-l:  #69f0ae;
      --gold:     #f59e0b;
      --gold-l:   #fcd34d;
      --text:     #e2e8f0;
      --muted:    #94a3b8;
      --dim:      #475569;
      --r:        16px;
    }

    html, body {
      height: 100%; height: 100svh;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── App frame: constrain width, center on desktop ── */
    .app {
      position: relative; z-index: 1;
      width: 100%; max-width: 480px;
      height: 100%; height: 100svh;
      margin: 0 auto;
      overflow: hidden;
    }

    /* ── Background Art ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
    }
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(139,92,246,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139,92,246,0.045) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 80%);
    }
    .bg-orb {
      position: absolute; border-radius: 50%;
      filter: blur(90px); animation: drift 22s ease-in-out infinite;
    }
    .bg-orb { display: none; }
    @keyframes drift {
      0%,100%{ transform: translate(0,0) scale(1); }
      33%    { transform: translate(28px,-18px) scale(1.04); }
      66%    { transform: translate(-18px,28px) scale(.96); }
    }

    /* ── Pages: fill the app frame, stacked ── */
    .page {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      overflow: hidden;
    }
    .page.active { display: flex; }

    /* ──────────────────────────────────────────
       LANDING
    ────────────────────────────────────────── */
    #pg-land {
      align-items: center; justify-content: center;
      padding: 32px 28px 48px; text-align: center;
      overflow-y: auto;
    }
    .land-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 100px; padding: 6px 16px;
      font-size: 11px; color: var(--muted);
      letter-spacing: .12em; text-transform: uppercase;
      margin-bottom: 28px;
      animation: fadeUp .6s ease both;
    }
    .land-badge::before {
      content:''; width:6px; height:6px;
      background: var(--text); border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.8)} }

    .land-title {
      font-size: clamp(60px,17vw,92px);
      font-weight: 900; letter-spacing: -.02em; line-height: 1;
      background: linear-gradient(160deg, #fff 0%, #9aa3ae 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
      animation: fadeUp .6s ease .08s both;
    }
    .land-sub {
      font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 22px;
      animation: fadeUp .6s ease .16s both;
    }
    .land-tagline {
      font-size: clamp(17px,4.5vw,21px); color: var(--muted);
      font-weight: 400; line-height: 1.55; max-width: 300px;
      margin: 0 auto 44px;
      animation: fadeUp .6s ease .24s both;
    }
    .land-tagline strong { color: var(--text); font-weight: 700; }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 9px;
      background: #fff;
      color: #000; font-size: 17px; font-weight: 700;
      padding: 16px 40px; border-radius: 100px; border: none;
      cursor: pointer; letter-spacing: .02em;
      box-shadow: none;
      transition: transform .2s, background .2s;
      animation: fadeUp .6s ease .32s both;
    }
    .btn-primary:hover { transform: translateY(-2px) scale(1.02); background: #e2e8f0; }
    .btn-primary:active { transform: scale(.97); }

    .land-stats {
      display: flex; gap: 32px; justify-content: center;
      margin-top: 52px;
      animation: fadeUp .6s ease .42s both;
    }
    .stat { text-align: center; }
    .stat-n {
      font-size: 22px; font-weight: 800;
      color: var(--text);
    }
    .stat-l { font-size: 11px; color: var(--dim); margin-top: 3px; }

    /* ──────────────────────────────────────────
       QUIZ
    ────────────────────────────────────────── */
    #pg-quiz { padding: 0; }

    .qz-head {
      padding: env(safe-area-inset-top, 48px) 20px 16px;
      padding-top: max(env(safe-area-inset-top, 0px), 52px);
      position: sticky; top: 0; z-index: 10;
      background: linear-gradient(to bottom, var(--bg) 80%, transparent);
    }

    /* ── Top bar: back + counter + pct ── */
    .qz-topbar {
      display: flex; align-items: center;
      gap: 12px; margin-bottom: 14px;
    }

    /* Back button */
    .qz-back {
      width: 38px; height: 38px; flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,.12);
      border-radius: 50%;
      background: rgba(255,255,255,.05);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted);
      transition: border-color .18s, color .18s, background .18s;
    }
    .qz-back:hover  { border-color: var(--border-h); color: var(--text); background: rgba(255,255,255,.07); }
    .qz-back:active { transform: scale(.93); }
    .qz-back.hidden { visibility: hidden; pointer-events: none; }

    /* Step counter – center, grows to fill */
    .qz-counter {
      flex: 1;
      display: flex; align-items: baseline; gap: 4px;
    }
    .qz-num {
      font-size: 28px; font-weight: 900; line-height: 1;
      color: var(--text);
    }
    .qz-denom {
      font-size: 15px; font-weight: 600; color: var(--dim);
    }

    /* Pct badge */
    .qz-pct-badge {
      font-size: 12px; font-weight: 700;
      color: var(--muted);
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 100px; padding: 4px 11px;
      white-space: nowrap;
    }

    /* Dots */
    .qz-dots {
      display: flex; gap: 5px; margin-bottom: 10px;
    }
    .qz-dot {
      flex: 1; height: 3px; border-radius: 100px;
      background: rgba(255,255,255,.08);
      transition: background .35s;
    }
    .qz-dot.done   { background: rgba(255,255,255,.3); }
    .qz-dot.active { background: #fff; box-shadow: none; }

    /* Progress bar (thin, below dots) */
    .qz-track { height: 2px; background: rgba(255,255,255,.06); border-radius: 100px; overflow: hidden; }
    .qz-fill {
      height: 100%; border-radius: 100px;
      background: #fff;
      box-shadow: none;
      transition: width .45s cubic-bezier(.4,0,.2,1);
    }

    .qz-body { flex: 1; padding: 20px 24px 40px; overflow-y: auto; }

    .qz-q {
      font-size: clamp(19px,5.2vw,25px); font-weight: 700;
      line-height: 1.45; margin-bottom: 26px; color: var(--text);
    }
    .qz-opts { display: flex; flex-direction: column; gap: 11px; }

    .opt {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r); padding: 15px 17px;
      cursor: pointer; user-select: none;
      transition: background .18s, border-color .18s, box-shadow .18s;
    }
    .opt:hover { background: var(--surface2); border-color: var(--border-h); }
    .opt:active { transform: scale(.98); }

    /* ★ Selected: double-ring glow — NO transform to avoid GPU layer promotion ★
       transform: scale() creates an independent compositor layer per element;
       when the slide is replaced, that layer lingers in GPU memory for 1-2 frames
       and appears as a ghost at the old option's position on the next question. */
    .opt.picked {
      background: rgba(255,255,255,.07);
      border-color: rgba(255,255,255,.55);
      box-shadow: 0 0 0 1px rgba(255,255,255,.2);
    }

    .opt-lbl {
      width: 33px; height: 33px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,.14);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: var(--muted);
      flex-shrink: 0; transition: all .2s;
    }
    .opt.picked .opt-lbl {
      background: #fff;
      border-color: transparent; color: #000;
    }
    .opt-txt { font-size: 15px; line-height: 1.5; color: var(--text); }
    .opt.picked .opt-txt { color: #fff; font-weight: 500; }

    .qz-slide { animation: slideIn .28s ease both; }
    @keyframes slideIn { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:translateX(0)} }

    /* ──────────────────────────────────────────
       RESULT
    ────────────────────────────────────────── */
    #pg-res {
      padding: 52px 24px 52px;
      padding-top: max(env(safe-area-inset-top, 0px), 52px);
      align-items: center; text-align: center;
      overflow-y: auto;
    }

    /* accent color is set per-result via JS: document.getElementById('pg-res').style.setProperty('--accent', color) */
    #pg-res { --accent: #00c853; }

    .res-eye {
      font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 16px;
      animation: fadeUp .5s ease both;
    }
    .res-hero {
      width: calc(100% - 24px); max-width: 370px;
      aspect-ratio: 1 / 1;
      border: none;
      border-radius: 16px;
      background: transparent;
      margin-bottom: 20px;
      animation: fadeUp .5s ease .1s both;
      flex-shrink: 0;
      overflow: hidden;
    }
    .res-hero img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .res-code {
      font-size: clamp(56px,16vw,84px); font-weight: 900;
      letter-spacing: .1em; line-height: 1;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      animation: codeReveal .85s cubic-bezier(.4,0,.2,1) .15s both;
    }
    @keyframes codeReveal {
      from { opacity:0; transform:scale(.65) translateY(16px); filter:blur(12px); }
      to   { opacity:1; transform:scale(1) translateY(0);      filter:blur(0); }
    }
    .res-name {
      font-size: clamp(18px,5.2vw,24px); font-weight: 800;
      color: var(--gold-l);
      animation: fadeUp .5s ease .5s both;
    }
    .res-desc-solo {
      font-size: 14px; line-height: 1.75; color: var(--muted);
      width: 100%; max-width: 370px; margin-bottom: 20px;
      animation: fadeUp .5s ease .54s both;
    }

    .res-card {
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 20px; padding: 20px 22px;
      width: 100%; max-width: 370px; margin-bottom: 16px;
      animation: fadeUp .5s ease .6s both;
    }
    .res-desc {
      font-size: 15px; line-height: 1.75;
      color: var(--muted); margin-bottom: 20px;
    }
    .res-stars-label {
      font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 10px;
    }
    .res-stars { display: flex; justify-content: center; gap: 5px; }
    .star {
      font-size: 24px; line-height: 1;
      animation: starPop .35s cubic-bezier(.34,1.56,.64,1) both;
    }
    .star.lit  { filter: drop-shadow(0 0 7px var(--gold)); color: var(--gold); }
    .star.dim  { color: rgba(255,255,255,.15); }
    @keyframes starPop {
      from { transform: scale(0) rotate(-35deg); opacity:0; }
      to   { transform: scale(1) rotate(0);      opacity:1; }
    }

    .res-grid {
      width: 100%; max-width: 370px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 12px; overflow: hidden;
      margin-bottom: 20px;
      flex-shrink: 0;
    }
    .res-cell {
      display: flex; align-items: center;
      padding: 16px; gap: 12px;
    }
    .res-cell + .res-cell {
      border-top: 1px solid rgba(255,255,255,.1);
    }
    .cell-letter { width: 30px; flex-shrink: 0; font-size: 18px; font-weight: 900; line-height: 1; text-align: center; }
    .cell-info   { flex: 1; min-width: 0; text-align: left; }
    .cell-name   { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .cell-desc   { font-size: 12px; color: rgba(255,255,255,.5); line-height: 1.4; }
    .cell-score  { width: 40px; flex-shrink: 0; font-size: 11px; font-weight: 700; color: var(--muted); text-align: right; }

    /* ── Tier (rank badge) ── */
    .res-tier {
      display: flex; align-items: center; gap: 16px;
      width: 100%; max-width: 370px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 16px; padding: 16px;
      margin-bottom: 16px;
      animation: fadeUp .5s ease .56s both;
    }
    .res-tier-rank {
      font-size: 44px; font-weight: 900; line-height: 1;
      letter-spacing: -.02em; color: var(--accent);
      flex-shrink: 0;
    }
    .res-tier-label {
      font-size: 13px; font-weight: 700;
      color: var(--accent); margin-bottom: 4px;
    }
    .res-tier-sub { font-size: 12px; color: var(--muted); }

    /* ── Interpretation card ── */
    .res-interp {
      width: 100%; max-width: 370px;
      background: #1a1f26;
      border-radius: 12px; padding: 16px;
      margin-bottom: 16px; flex-shrink: 0;
      animation: fadeUp .5s ease .72s both;
    }
    .res-interp-title {
      font-size: 14px; color: rgba(255,255,255,.5);
      margin-bottom: 10px;
    }
    .res-interp-body {
      font-size: 15px; line-height: 1.9;
      color: rgba(255,255,255,.9); text-align: left;
    }

    /* ── Insight card (single card, 3 sections) ── */
    .res-insights {
      width: 100%; max-width: 370px; margin-bottom: 16px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 12px; overflow: hidden;
      flex-shrink: 0;
      animation: fadeUp .5s ease .76s both;
    }
    .insight-card {
      padding: 16px;
      text-align: left;
    }
    .insight-card + .insight-card {
      border-top: 1px solid rgba(255,255,255,.1);
    }
    .insight-tag {
      font-size: 14px; font-weight: 700;
      letter-spacing: .03em;
      margin-bottom: 6px; text-align: left;
    }
    .insight-tag.adv    { color: #00c853; }
    .insight-tag.trap   { color: #ff6b6b; }
    .insight-tag.advice { color: var(--muted); }
    .insight-text { font-size: 14px; line-height: 1.65; color: var(--text); }

    /* ── Disclaimer ── */
    .res-disclaimer {
      width: 100%; max-width: 370px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 12px; padding: 14px 16px;
      margin-bottom: 16px;
      font-size: 12px; line-height: 1.7;
      color: rgba(255,255,255,.4); text-align: center;
      animation: fadeUp .5s ease .92s both;
    }

    .res-disclaimer-author {
      display: inline-block; margin-top: 10px;
      font-size: 12px; color: rgba(255,255,255,.4);
      text-decoration: underline; text-underline-offset: 3px;
      cursor: pointer;
    }
    .res-disclaimer-author:hover { color: rgba(255,255,255,.7); }

    /* ── Stats counter ── */
    .res-stats {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: var(--dim);
      width: 100%; max-width: 370px;
      margin-bottom: 16px;
      animation: fadeUp .5s ease .9s both;
    }
    .res-stats em { color: var(--muted); font-style: normal; font-weight: 600; }
    .res-stats-pct { color: var(--muted); font-weight: 600; font-size: 12px; }

    .res-actions {
      display: flex; flex-direction: column; gap: 11px;
      width: 100%; max-width: 370px;
      animation: fadeUp .5s ease 1.0s both;
    }
    .btn-share {
      display: flex; align-items: center; justify-content: center; gap: 9px;
      background: var(--green);
      color: #000; font-size: 16px; font-weight: 700;
      padding: 16px; border-radius: 100px; border: none; cursor: pointer;
      box-shadow: 0 0 32px rgba(0,200,83,.3);
      transition: all .2s;
    }
    .btn-share:active { transform: scale(.97); }
    .btn-retry {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: transparent; color: var(--muted);
      font-size: 15px; padding: 14px; border-radius: 100px;
      border: 1.5px solid rgba(255,255,255,.1); cursor: pointer;
      transition: all .2s;
    }
    .btn-retry:hover { border-color: rgba(255,255,255,.2); color: var(--text); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 36px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(18,25,45,.95);
      border: 1px solid rgba(0,200,83,.3);
      border-radius: 100px; padding: 12px 26px;
      font-size: 14px; color: var(--text);
      backdrop-filter: blur(24px);
      z-index: 200; white-space: nowrap;
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
    }
    .toast.on { transform: translateX(-50%) translateY(0); }

    /* ── Shared ── */
    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

    /* ── Language toggle ── */
    .lang-toggle {
      position: absolute; top: 14px; right: 14px; z-index: 50;
      padding: 6px 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 100px;
      color: rgba(255,255,255,.72);
      font-size: 12px; font-weight: 700; letter-spacing: .06em;
      cursor: pointer; user-select: none;
      transition: all .2s;
    }
    .lang-toggle:hover {
      background: rgba(255,255,255,.1);
      color: #fff;
      border-color: rgba(255,255,255,.22);
    }

    /* ── Share card (hidden offscreen, rendered to PNG via html2canvas) ── */
    #sc-root {
      position: fixed; top: 0; left: -9999px;
      width: 360px;
      font-family: 'Space Mono', monospace;
      z-index: -1; pointer-events: none;
    }
    .sc-card {
      width: 360px;
      background: #161b1f;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
    }
    .sc-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--sc-accent,#fbbf24) 0%, #fff 50%, var(--sc-accent,#fbbf24) 100%);
    }
    .sc-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 20px 12px;
    }
    .sc-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; letter-spacing: 3px;
      color: rgba(255,255,255,0.2);
    }
    .sc-grade-badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px; letter-spacing: 2px;
      color: var(--sc-accent,#fbbf24);
      border: 1px solid var(--sc-accent-border,rgba(251,191,36,0.4));
      padding: 3px 10px; border-radius: 4px;
    }
    .sc-image-wrap {
      margin: 0 16px;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      background: #1e262b;
      aspect-ratio: 1 / 1;
    }
    .sc-image-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center center;
      display: block;
    }
    .sc-image-wrap::after {
      content: ''; position: absolute;
      bottom: 0; left: 0; right: 0; height: 50px;
      background: linear-gradient(to top, rgba(22,27,31,1), rgba(22,27,31,0));
    }
    .sc-info { padding: 16px 20px 10px; }
    .sc-type-row {
      display: flex; align-items: baseline; gap: 10px;
      margin-bottom: 4px;
    }
    .sc-code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px; letter-spacing: 4px;
      color: #fff; line-height: 1;
    }
    .sc-sub-grade {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px; letter-spacing: 2px;

const t = (k) => COPY[lang][k];
const getResults = () => lang === 'en' ? RESULTS_EN : RESULTS;
const getDims = () => lang === 'en' ? DIMS_EN : DIMS;
const getDimsDetail = () => lang === 'en' ? DIMS_DETAIL_EN : DIMS_DETAIL;
const getQText = (i) => {
  if (lang === 'en' && QS_EN_TEXT[i]) {
    return { q: QS_EN_TEXT[i].q, opts: QS_EN_TEXT[i].opts };
  }
  return { q: QS[i].q, opts: QS[i].opts.map(o => o.t) };
};

function applyLang() {
  // update static [data-i18n] elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const val = t(key);
    if (val == null) return;
    if (el.getAttribute('data-i18n-html')) el.innerHTML = val;
    else el.textContent = val;
  });
  // update lang toggle label
  const tg = document.getElementById('lang-toggle');
  if (tg) tg.textContent = lang === 'zh' ? 'EN' : '中';
  // update html lang attribute
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
}

function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  try { localStorage.setItem('ctti_lang', lang); } catch(e) {}
  applyLang();
  // re-render dynamic page if currently on quiz or result
  const activePage = document.querySelector('.page.active');
  if (activePage && activePage.id === 'pg-quiz') renderQ();
  else if (activePage && activePage.id === 'pg-res' && window._resultType) showResult(window._resultType);
}

/* ── State ── */
let cur = 0, ans = [];

/* ── Navigation ── */
function show(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById(id);
  page.classList.add('active');
  // Reset internal scroll for scrollable pages
  page.scrollTop = 0;
  const inner = page.querySelector('.qz-body');
  if (inner) inner.scrollTop = 0;
}

/* ── Quiz ── */
function startQuiz() {
  cur = 0; ans = [];
  show('pg-quiz');
  renderQ();
}

function renderQ() {
  const q   = QS[cur];
  const qt  = getQText(cur);
  const pct = Math.round((cur / QS.length) * 100);

  document.getElementById('q-cur').textContent   = cur + 1;
  document.getElementById('q-pct').textContent   = pct;
  document.getElementById('qz-fill').style.width = pct + '%';
  document.getElementById('qz-back').classList.toggle('hidden', cur === 0);

  // Dots
  document.getElementById('qz-dots').innerHTML = Array.from({length: QS.length}, (_, i) => {
    const cls = i < cur ? 'done' : i === cur ? 'active' : '';
    return `<div class="qz-dot ${cls}"></div>`;
  }).join('');

  // ── Build every element from scratch with createElement ──
  // Never reuse or partially update existing nodes; browser gets zero old
  // element identity to pull a composited layer from.

  // Question text
  const qEl = document.createElement('div');
  qEl.className = 'qz-q';
  qEl.textContent = qt.q;

  // Options container — freshly created, exact count for this question
  const optsEl = document.createElement('div');
  optsEl.className = 'qz-opts';

  q.opts.forEach((o, i) => {
    const lbl = document.createElement('div');
    lbl.className = 'opt-lbl';
    lbl.textContent = o.l;

    const txt = document.createElement('div');
    txt.className = 'opt-txt';
    txt.textContent = qt.opts[i] || o.t;

    const opt = document.createElement('div');
    opt.className = 'opt';
    opt.id = `o${i}`;
    opt.appendChild(lbl);
    opt.appendChild(txt);
    // Use closure-safe binding
    opt.addEventListener('click', (function(idx){ return () => pick(idx); })(i));

    optsEl.appendChild(opt);
  });

  // Slide wrapper
  const slide = document.createElement('div');
  slide.className = 'qz-slide';
  slide.appendChild(qEl);
  slide.appendChild(optsEl);

  // Atomically replace all body children — old nodes are fully detached
  const body = document.getElementById('qz-body');
  body.scrollTop = 0;
  body.replaceChildren(slide);   // replaceChildren removes ALL existing children first
}

function pick(i) {
  // Highlight selected and block further clicks via CSS class
  document.querySelectorAll('.opt').forEach(o => o.classList.remove('picked'));
  document.getElementById('o' + i).classList.add('picked');
  document.getElementById('qz-body').style.pointerEvents = 'none';

  ans.push(QS[cur].opts[i].v);

  // 0.8s so user sees the highlight, then wipe + advance
  setTimeout(() => {
    document.getElementById('qz-body').style.pointerEvents = '';
    cur++;
    if (cur >= QS.length) calcResult();
    else renderQ();
  }, 800);
}

function goBack() {
  if (cur === 0) return;
  ans.pop();
  cur--;
  renderQ();
}

/* ── Scoring ── */
function calcResult() {
  const dimOf = q => q.opts[0].dim;
  const dim1 = QS.reduce((acc, q, i) => dimOf(q) === 1 ? [...acc, ans[i]] : acc, []);
  const dim2 = QS.reduce((acc, q, i) => dimOf(q) === 2 ? [...acc, ans[i]] : acc, []);
  const dim3 = QS.reduce((acc, q, i) => dimOf(q) === 3 ? [...acc, ans[i]] : acc, []);
  const dim4 = QS.reduce((acc, q, i) => dimOf(q) === 4 ? [...acc, ans[i]] : acc, []);
  const d1 = majority(dim1, 'F', 'S');
  const d2 = majority(dim2, 'A', 'D');
  const d3 = majority(dim3, 'C', 'H');
  const d4 = majority(dim4, 'T', 'I');
  showResult(d1 + d2 + d3 + d4);
}

function majority(votes, posV, negV) {
  const pos = votes.filter(v => v === posV).length;
  const neg = votes.filter(v => v === negV).length;
  return pos >= neg ? posV : negV;
}

/* ── Tier helper (lang-aware) ── */
function getTier(stars) {
  const tiers = COPY[lang].tiers;
  if (stars >= 5) return tiers[5];
  if (stars >= 4) return tiers[4];
  return tiers[3];
}

/* ── Stats counter (localStorage) ── */
function getStats() {
  const BASE = 2847, now = Date.now();
  let first = localStorage.getItem('ctti_fv');
  if (!first) { first = String(now); localStorage.setItem('ctti_fv', first); }
  const hours = Math.min(Math.floor((now - +first) / 3600000), 720);
  let n = BASE;
  for (let h = 0; h < hours; h++) { n += 3 + (+first + h * 7 + h * h * 13) % 6; }
  return n;
}

    <div class="insight-card">
      <div class="insight-tag advice">${t('tagAdvice')}</div>
      <div class="insight-text">${r.advice}</div>
    </div>`;

  // 10. Stats + share
  const n = getStats();
  const pct = TYPE_PCT[type] || '6.3';
  document.getElementById('r-stats').innerHTML = COPY[lang].statsLine(n, type, pct);

  document.getElementById('share-label').textContent = tier.share;
  window._resultType = type;
  window._resultName = r.name;
}

/* ── Scramble animation ── */
function scramble(el, final, dur) {
  const alpha = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const steps = 24, iv = dur / steps;
  let step = 0;
  const t = setInterval(() => {
    step++;
    if (step >= steps) { el.textContent = final; clearInterval(t); return; }
    const progress = step / steps;
    el.textContent = final.split('').map((ch, i) =>
      i / final.length < progress ? ch : alpha[Math.floor(Math.random() * alpha.length)]
    ).join('');
  }, iv);
}

/* ── Share card data (TYPE description + stars per personality) ── */
const SHARE_CARDS = {
  FACT:{type:'闪电·快手',stars:4}, FACI:{type:'闪电·直觉',stars:4},
  FAHT:{type:'梭哈·技术',stars:3}, FAHI:{type:'梭哈·直觉',stars:3},
  FDCT:{type:'节奏·系统',stars:5}, FDCI:{type:'灵动·直觉',stars:4},
  FDHT:{type:'分仓·技术',stars:4}, FDHI:{type:'分仓·直觉',stars:3},
  SACT:{type:'冷血·精准',stars:5}, SACI:{type:'潜伏·豹子',stars:4},
  SAHT:{type:'钻石·长线',stars:3}, SAHI:{type:'佛系·躺平',stars:3},
  SDCT:{type:'理性·建筑',stars:5}, SDCI:{type:'稳健·老手',stars:5},
  SDHT:{type:'图表·坚守',stars:4}, SDHI:{type:'冬眠·淡定',stars:3}
};
const SHARE_TIERS = {
  5:{rank:'S+',short:'王牌',letter:'S',color:'#4ade80',border:'rgba(74,222,128,0.4)'},
  4:{rank:'A-',short:'潜力',letter:'A',color:'#fbbf24',border:'rgba(251,191,36,0.4)'},
  3:{rank:'B+',short:'幸存',letter:'B',color:'#ef4444',border:'rgba(239,68,68,0.4)'}
};

/* Populate the hidden share card with a given type */
function populateShareCard(type) {
  const name = (RESULTS[type] || RESULTS.FDCT).name;
  const sc = SHARE_CARDS[type] || SHARE_CARDS.FDCT;
  const tier = SHARE_TIERS[sc.stars];
  const card = document.getElementById('sc-card');
  card.style.setProperty('--sc-accent', tier.color);
  card.style.setProperty('--sc-accent-border', tier.border);
  document.getElementById('sc-code').textContent = type;
  document.getElementById('sc-img').src = `images/${type}.png`;
  document.getElementById('sc-grade-badge').textContent = `${tier.letter} · ${tier.short}`;
  document.getElementById('sc-sub-grade').textContent = tier.rank;
  document.getElementById('sc-potential-span').textContent = tier.short;
  document.getElementById('sc-name').textContent = name;
  document.getElementById('sc-type-desc').textContent = sc.type;
  let starHTML = '';
  for (let i = 0; i < 5; i++) {
    starHTML += `<span class="sc-star ${i < sc.stars ? 'on' : 'off'}">★</span>`;
  }
  document.getElementById('sc-stars').innerHTML = starHTML;
}

/* Render share card to a PNG blob */
async function generateCardBlob(type) {
  populateShareCard(type);
  // wait for image load
  const img = document.getElementById('sc-img');
  await new Promise(r => {
    if (img.complete && img.naturalWidth) r();
    else { img.onload = r; img.onerror = r; }
  });
  // wait for fonts
  if (document.fonts && document.fonts.ready) {
    try { await document.fonts.ready; } catch(e) {}
  }
  const canvas = await html2canvas(document.getElementById('sc-card'), {
    backgroundColor: null,
    scale: 2,
    logging: false,
    useCORS: true
  });
  return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
}

/* ── Share: open X compose directly with text + environment-matched URL ── */
const PROD_URL = 'https://ctti-blush.vercel.app/';
function getShareUrl() {
  // prod domain → always use the clean prod URL
  if (location.hostname === 'ctti-blush.vercel.app') return PROD_URL;
  // staging / local → share current origin so the tweet links back to the same env
  return location.origin + '/';
}
function shareResult() {
  const text = `${t('shareText')}\n${getShareUrl()}`;
  const intentUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
  window.location.href = intentUrl;
}

function doCopy(text, onSuccess) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(() => legacyCopy(text, onSuccess));
  } else {
    legacyCopy(text, onSuccess);
  }
}

function legacyCopy(text, onSuccess) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); onSuccess(); } catch(e) {}
  document.body.removeChild(ta);
}

/* ── Toast ── */
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), 2600);
}
